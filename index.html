<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results Summary</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- LEFT RESULT CARD -->

    <div class="result">

        <h3>Your Result</h3>

        <div class="score-circle">
            <h1>76</h1>
            <p>of 100</p>
        </div>

        <h2>Great</h2>

        <p class="description">
            You scored higher than 65% of the people who have taken these tests.
        </p>

    </div>


    <!-- RIGHT SUMMARY CARD -->

    <div class="summary">

        <h3>Summary</h3>

        <div class="item reaction">
            <span>Reaction</span>
            <span><b>80</b> / 100</span>
        </div>

        <div class="item memory">
            <span>Memory</span>
            <span><b>92</b> / 100</span>
        </div>

        <div class="item verbal">
            <span>Verbal</span>
            <span><b>61</b> / 100</span>
        </div>

        <div class="item visual">
            <span>Visual</span>
            <span><b>73</b> / 100</span>
        </div>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
